name: release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install Zig
        uses: mlugg/setup-zig@v1
      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache
            zig-out
          key: ${{ runner.os }}-zig-${{ hashFiles('build.zig', 'build.zig.zon', 'src/**/*.zig') }}
      - name: Install N-API headers
        run: npm ci
      - name: Zig tests
        run: zig build test --summary all
      - name: Build shared library
        run: zig build -Doptimize=ReleaseSmall -Dnapi-include=node_modules/node-api-headers/include
      - name: Prepare prebuilds
        shell: bash
        run: |
          mkdir -p prebuilds/${{ runner.os == 'Linux' && 'linux' || runner.os == 'macOS' && 'darwin' || 'win32' }}-${{ runner.arch == 'X64' && 'x64' || 'arm64' }}
          cp zig-out/lib/libzig_id.* prebuilds/*/zig-id.node 2>/dev/null || cp zig-out/bin/zig_id.dll prebuilds/*/zig-id.node 2>/dev/null || true
      - name: JS tests
        run: node test/test.js

  build-cross:
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-linux-gnu
          - aarch64-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
      - name: Install N-API headers
        run: npm ci
      - name: Build for ${{ matrix.target }}
        run: |
          zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSmall -Dnapi-include=node_modules/node-api-headers/include
          mkdir -p prebuilds/${{ matrix.target == 'aarch64-linux-gnu' && 'linux-arm64' || 'darwin-arm64' }}
          cp zig-out/lib/libzig_id.* prebuilds/*/zig-id.node

  publish:
    needs: [test, build-cross]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: https://registry.npmjs.org
      - name: Download prebuilds
        uses: actions/download-artifact@v4
        with:
          path: prebuilds
      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
